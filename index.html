<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>Kunal Fitness</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Baloo+Bhai+2&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <!-- left logo and header -->
        <div id="left">
            <img src="image/logo.png" alt="">
            <h1>
                Kunal Fitness
            </h1>
        </div>
        <!-- middle navigation -->
        <div id="middle">
          <div id="navbar">
            <ul>
                <li> <a href="">Home</a></li>
                <li> <a href="">Abut Us</a></li>
                <li> <a href="">Fitness Calculator</a></li>
                <li> <a href="">Contact Us</a></li>
            </ul>
          </div>
        </div>
        <!-- right button -->
        <div id="right">
            <button class="btn">Call Us</button>
             <button class="btn">Email Us</button>
        </div>
    </header>
    <div id="container">
        <h1>
            Join the Best Gym of Darbhanga
        </h1>
        <form action="noaction.pht">
            <div  id="form-group">
            <input type="text" name="name" id="name" placeholder="Enter Your Name"></div>
            <div id="form-group">
            <input type="text" name="name" id="name" placeholder="Enter Your Age"></div>
            <div id="form-group">
            <input type="text" name="name" id="name" placeholder="Enter Your Gender"></div>
            <div id="form-group">
            <input type="text" name="name" id="name" placeholder="Enter Your Locality "></div>
            <div id="form-group">
            <input type="text" name="name" id="name" placeholder="Enter Your Phone Number"></div>
            <div id="form-group">
            <input type="email" name="name" id="name" placeholder="Enter Your Email Id"></div>
            <button  class="btn" id="form-btn">Submit</button>
        </form>
    </div>
</body>
</html>
